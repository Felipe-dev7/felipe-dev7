<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 200" width="100%" height="auto">
  <style>
    @keyframes spin1 {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    @keyframes spin2 {
      from { transform: rotate(360deg); }
      to { transform: rotate(0deg); }
    }
    .gear-big {
      animation: spin1 4s linear infinite;
      transform-origin: 180px 100px;
    }
    .gear-small {
      animation: spin2 3s linear infinite;
      transform-origin: 320px 100px;
    }
  </style>
  
  <!-- Fundo transparente -->
  <rect width="100%" height="100%" fill="none"/>
  
  <!-- Engrenagem Grande (esquerda) -->
  <g class="gear-big">
    <!-- Corpo principal -->
    <circle cx="180" cy="100" r="50" fill="none" stroke="#ffffff" stroke-width="8"/>
    <circle cx="180" cy="100" r="25" fill="none" stroke="#ffffff" stroke-width="6"/>
    <circle cx="180" cy="100" r="8" fill="#ffffff"/>
    
    <!-- Dentes da engrenagem grande -->
    <rect x="175" y="40" width="10" height="20" rx="2" fill="#ffffff"/>
    <rect x="175" y="140" width="10" height="20" rx="2" fill="#ffffff"/>
    <rect x="130" y="95" width="20" height="10" rx="2" fill="#ffffff"/>
    <rect x="210" y="95" width="20" height="10" rx="2" fill="#ffffff"/>
    
    <!-- Dentes em diagonal -->
    <rect x="145" y="55" width="10" height="20" rx="2" fill="#ffffff" transform="rotate(45 150 65)"/>
    <rect x="205" y="55" width="10" height="20" rx="2" fill="#ffffff" transform="rotate(-45 210 65)"/>
    <rect x="145" y="125" width="10" height="20" rx="2" fill="#ffffff" transform="rotate(-45 150 135)"/>
    <rect x="205" y="125" width="10" height="20" rx="2" fill="#ffffff" transform="rotate(45 210 135)"/>
    
    <!-- Raios internos -->
    <line x1="180" y1="75" x2="180" y2="55" stroke="#ffffff" stroke-width="4"/>
    <line x1="180" y1="125" x2="180" y2="145" stroke="#ffffff" stroke-width="4"/>
    <line x1="155" y1="100" x2="135" y2="100" stroke="#ffffff" stroke-width="4"/>
    <line x1="205" y1="100" x2="225" y2="100" stroke="#ffffff" stroke-width="4"/>
  </g>
  
  <!-- Engrenagem Pequena (direita) -->
  <g class="gear-small">
    <circle cx="320" cy="100" r="30" fill="none" stroke="#ffffff" stroke-width="6"/>
    <circle cx="320" cy="100" r="15" fill="none" stroke="#ffffff" stroke-width="4"/>
    <circle cx="320" cy="100" r="5" fill="#ffffff"/>
    
    <!-- Dentes da engrenagem pequena -->
    <rect x="317" y="65" width="6" height="12" rx="1" fill="#ffffff"/>
    <rect x="317" y="123" width="6" height="12" rx="1" fill="#ffffff"/>
    <rect x="285" y="97" width="12" height="6" rx="1" fill="#ffffff"/>
    <rect x="343" y="97" width="12" height="6" rx="1" fill="#ffffff"/>
    
    <!-- Dentes diagonais pequenos -->
    <rect x="295" y="73" width="6" height="12" rx="1" fill="#ffffff" transform="rotate(45 298 79)"/>
    <rect x="339" y="73" width="6" height="12" rx="1" fill="#ffffff" transform="rotate(-45 342 79)"/>
    <rect x="295" y="115" width="6" height="12" rx="1" fill="#ffffff" transform="rotate(-45 298 121)"/>
    <rect x="339" y="115" width="6" height="12" rx="1" fill="#ffffff" transform="rotate(45 342 121)"/>
  </g>
</svg>